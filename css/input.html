<!DOCTYPE html>

    <style>
        .button-group {
            display: flex;              /* 버튼을 수평으로 배치 */
            justify-content: center;    /* 가로 가운데 정렬 */
            gap: 2vw;                  /* 버튼 사이 간격 */
            opacity: 0.5;
        }
        .dummy{
            opacity: 0.5;
        }
    </style>
    <body>
        <div>

                <button>버튼이름</button>
                <button>버튼이름</button>
                <button>버튼이름</button>
            </div>
            <div>

            </div>
            <div>
                <input type="file" />
            </div>
            <div>
                <label>여러줄 입력:</label>
                <textarea rows="10" cols="30" ></textarea>
            </div>
            <div>
                <label for="fruit">과일 선택:</label>

                <select id="fruit">
                    <option value="">선택하세요</option>
                    <option value="apple">사과</option>
                    <option value="banana">바나나</option>
                    <option value="orange">오렌지</option>
                </select>
            </div>
            <div class="dummy">
                <p>sdfsd sdfsdfd</p>
            </div>
        </div>
