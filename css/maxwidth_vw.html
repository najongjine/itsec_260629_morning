<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    .container {
      width: 100%;
      min-height: 100vh;

      display: grid;

      /* 헤더는 작게, 몸통은 나머지 전부 */
      grid-template-rows: 15vw 1fr;
    }

    /* 화면 전체 너비를 사용하는 헤더 */
    .top {
      width: 100%;
      border-bottom: 1px solid #999;
      background-color: #eeeeee;
    }

    /* 헤더 안쪽 실제 내용 */
    .top-inner {
      width: 100%;
      max-width: 1200px;
      height: 100%;

      margin: 0 auto;
      padding: 1.5vw;

      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* 아래쪽 전체 몸통 영역 */
    .body {
      width: 100%;
      background-color: white;
    }

    /* 몸통 안쪽 실제 콘텐츠 */
    .body-inner {
      width: 100%;
      max-width: 1200px;

      margin: 0 auto;
      padding: 3vw;
    }

    .title {
      font-size: clamp(1vw, 3vw, 10vw);
    }
    .content {
    width: 300px;
    height: 150px;
    overflow-y: auto; /* 세로로 넘칠 때 스크롤 표시 */
    resize: none;     /* 사용자가 크기 조절 못 하게 함 */
    }
  </style>
</head>

<body>

  <div class="container">

    <header class="top">
      <div class="top-inner">
        <strong class="title">사이트 로고</strong>

        <nav >
          홈 | 게시판 | 로그인
        </nav>
      </div>
    </header>

    <main class="body">
      <div class="body-inner">

        <h1 class="title">몸통 영역</h1>

        <p>
          실제 페이지 내용은 모두 여기에 들어갑니다.
        </p>

        <p>
          게시글, 상품 목록, 이미지, 카드 등이 들어가는 영역입니다.
        </p>
        <div>
            <textarea class="content"></textarea>
        </div>
      </div>
    </main>

  </div>

</body>
</html>
